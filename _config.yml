# Warmpaper Theme Configuration

# Navigation menu
menu:
  Home: /
  Archives: /archives
  Tags: /tags
  Categories: /categories
  About: /about

# Table of Contents (right sidebar on post pages)
toc:
  enable: true
  max_depth: 3
  min_depth: 2
  list_number: false

# Math (LaTeX) rendering via MathJax v4.
# Requires a Markdown renderer that passes through $...$ (see README).
# Per-post override: set `math: true` / `math: false` in a post's front-matter.
math:
  enable: true

# Waline comment
waline:
  enable: false
  serverURL: 'https://your-server-url'

# Giscus comment (GitHub Discussions)
# 到 https://giscus.app 生成 repo / category 的 ID 后填入
giscus:
  enable: false
  repo: 'user/repo'
  repo_id: ''
  category: 'Announcements'
  category_id: ''
  mapping: 'pathname'
  strict: '0'
  reactions_enabled: '1'
  emit_metadata: '0'
  input_position: 'bottom'
  lang: 'zh-CN'
  # 主题名见 https://giscus.app(也可填自定义 CSS 的 URL)
  theme_light: 'light'
  theme_dark: 'dark'

# Profile (shown on homepage above post list)
profile:
  avatar: /images/logo.svg
  description: ""
  links:
    - name: GitHub
      url: https://github.com/finch-xu/
      icon: github
    # - name: Email
    #   url: mailto:your@email.com
    #   icon: email
    - name: pidan.dev
